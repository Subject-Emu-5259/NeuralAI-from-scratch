<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#09090b;color:#e4e4e7;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.header{height:50px;background:#18181b;border-bottom:1px solid #27272a;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;color:#fff;font-weight:600;font-size:15px;text-decoration:none}
.logo img{width:28px;height:28px;border-radius:6px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.icon-btn{width:36px;height:36px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#71717a}
.icon-btn:hover{background:#27272a;color:#fff}

/* Tab bar */
.tab-bar{display:flex;gap:2px;padding:4px 12px;background:#18181b;border-bottom:1px solid #27272a}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:#71717a;font-size:13px;font-weight:500;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px}
.tab-btn:hover{background:#27272a;color:#a1a1aa}
.tab-btn.active{background:#27272a;color:#a78bfa}
.tab-btn svg{width:16px;height:16px}

/* Tab content */
.tab-content{display:none;flex:1;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:240px;background:#18181b;border-right:1px solid #27272a;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:12px}
.new-chat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.new-chat-btn:hover{opacity:0.9}
.sidebar-history{flex:1;overflow-y:auto;padding:8px}
.history-label{font-size:10px;font-weight:600;color:#52525b;text-transform:uppercase;padding:8px 12px 4px}
.history-item{width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;color:#a1a1aa;cursor:pointer;border:none;background:transparent;text-align:left}
.history-item:hover{background:#27272a;color:#fff}
.history-item.active{background:#3f3f46;color:#fff}
.sidebar-footer{padding:12px;border-top:1px solid #27272a}
.user-info{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#22d3ee);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}
.user-name{font-size:13px;font-weight:500;color:#fff}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#09090b}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.welcome-logo{width:64px;height:64px;margin-bottom:20px}
.welcome-logo img{width:100%;height:100%;border-radius:16px}
.welcome h1{font-size:26px;font-weight:600;color:#fff;margin-bottom:8px}
.welcome p{font-size:14px;color:#71717a;max-width:400px;line-height:1.6;margin-bottom:24px}
.prompt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:480px;width:100%}
.prompt-card{display:flex;align-items:center;gap:10px;padding:12px;background:#18181b;border:1px solid #27272a;border-radius:8px;font-size:13px;color:#a1a1aa;cursor:pointer;text-align:left}
.prompt-card:hover{background:#27272a;border-color:#3f3f46;color:#fff}
.prompt-icon{font-size:16px}

/* Messages */
.messages{display:flex;flex-direction:column;gap:12px;padding:16px 24px;overflow-y:auto;flex:1}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#27272a;border-radius:2px}
.message{display:flex;gap:12px;max-width:720px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.message.assistant .msg-avatar{background:#7c3aed;color:#fff}
.message.user .msg-avatar{background:#2563eb;color:#fff}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.message.assistant .msg-bubble{background:#18181b;border:1px solid #27272a;border-radius:12px 12px 12px 4px;color:#e4e4e7}
.message.user .msg-bubble{background:#1e1b4b;border-radius:12px 12px 4px 12px;color:#c4b5fd}
.msg-bubble pre{background:#09090b;border:1px solid #27272a;border-radius:6px;padding:10px;margin:8px 0;overflow-x:auto;font-size:12px}
.msg-bubble code{background:#27272a;padding:2px 4px;border-radius:3px;font-size:12px;color:#a78bfa}
.msg-bubble pre code{background:transparent;padding:0}

/* Thinking */
.thinking{display:flex;align-items:center;gap:6px;color:#71717a;font-size:13px}
.dots{display:flex;gap:3px}
.dots span{width:4px;height:4px;background:#7c3aed;border-radius:50%;animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* Input area */
.input-area{padding:12px 24px 16px;flex-shrink:0}
.input-wrapper{display:flex;align-items:flex-end;gap:10px;background:#18181b;border:1px solid #27272a;border-radius:12px;padding:8px 10px 8px 14px}
.input-wrapper:focus-within{border-color:#7c3aed}
textarea{flex:1;border:none;outline:none;background:transparent;color:#e4e4e7;font-size:14px;resize:none;max-height:120px;line-height:1.5}
textarea::placeholder{color:#52525b}
.attach-btn{width:32px;height:32px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#71717a}
.attach-btn:hover{background:#27272a;color:#a78bfa}
.send-btn{width:36px;height:36px;border-radius:8px;border:none;background:#7c3aed;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:#6d28d9}
.send-btn:disabled{background:#27272a;cursor:not-allowed}
.send-btn svg{width:16px;height:16px;stroke:#fff}
.input-footer{display:flex;justify-content:center;gap:8px;margin-top:8px}
.footer-stat{font-size:11px;color:#52525b}

/* Attached files */
.attached-files{display:flex;flex-wrap:wrap;gap:4px;padding:8px 24px;background:#18181b;border-bottom:1px solid #27272a}
.file-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;background:#27272a;border:1px solid #3f3f46;border-radius:20px;font-size:11px;color:#a78bfa;cursor:pointer}
.file-chip:hover{background:#3f3f46}

/* Terminal */
.terminal-wrap{flex:1;display:flex;flex-direction:column;background:#09090b}
.terminal-header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#18181b;border-bottom:1px solid #27272a}
.terminal-dots{display:flex;gap:6px}
.terminal-dot{width:12px;height:12px;border-radius:50%}
.dot-red{background:#ef4444}.dot-yellow{background:#fbbf24}.dot-green{background:#22c55e}
.terminal-title{flex:1;text-align:center;font-size:12px;color:#71717a;font-family:monospace}
.term-btn{padding:4px 10px;background:#27272a;border:1px solid #3f3f46;border-radius:4px;color:#a1a1aa;font-size:11px;cursor:pointer}
.term-btn:hover{background:#3f3f46;color:#fff}
.term-btn.danger:hover{background:#7f1d1d;border-color:#b91c1c;color:#fca5a5}
#terminal-output{flex:1;overflow-y:auto;padding:12px 16px;font-family:monospace;font-size:13px;line-height:1.5;color:#e4e4e7;white-space:pre-wrap}
.term-line{margin-bottom:2px}
.term-line.error{color:#f87171}.term-line.success{color:#4ade80}.term-line.info{color:#60a5fa}
#terminal-input-row{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#18181b;border-top:1px solid #27272a}
#terminal-input{flex:1;background:transparent;border:none;outline:none;color:#22d3ee;font-family:monospace;font-size:13px}

/* Settings modal */
.settings-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100}
.settings-modal.open{display:flex}
.settings-panel{width:400px;background:#18181b;border:1px solid #27272a;border-radius:12px;padding:20px}
.settings-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #27272a}
.settings-label{font-size:13px;color:#a1a1aa}
.settings-value{font-size:13px;color:#e4e4e7}
.close-btn{margin-top:16px;width:100%;padding:10px;background:#27272a;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer}
.close-btn:hover{background:#3f3f46}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 16px;background:#18181b;border:1px solid #27272a;border-radius:8px;font-size:13px;color:#e4e4e7;z-index:99;animation:slideUp .3s}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast.success{border-color:#22c55e}
.toast.error{border-color:#ef4444}
</style>
</head>
<body>
<div class="header">
<a href="/" class="logo"><img src="/static/logo.png" alt="">NeuralAI</a>
<div class="header-right">
<button class="icon-btn" id="settingsBtn" title="Settings"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
<button class="icon-btn" id="exportBtn" title="Export"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
<button class="icon-btn" id="infoBtn" title="Info"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></button>
</div>
</div>

<div class="tab-bar">
<button class="tab-btn active" data-tab="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</button>
<button class="tab-btn" data-tab="terminal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Terminal</button>
</div>

<div class="main">
<div class="tab-content active" id="tab-chat">
<div class="sidebar">
<div class="sidebar-header"><button class="new-chat-btn" id="newChatBtn">+ New chat</button></div>
<div class="sidebar-history"><div class="history-label">Today</div><button class="history-item active">New conversation</button></div>
<div class="sidebar-footer"><div class="user-info"><div class="user-avatar">D</div><div class="user-name">Dendrew</div></div></div>
</div>

<div class="chat-area">
<div class="welcome" id="welcomeScreen">
<div class="welcome-logo"><img src="/static/logo.png" alt=""></div>
<h1>Hello, I'm NeuralAI</h1>
<p>Your personal AI assistant. I can read documents, write code, and help with any task.</p>
<div class="prompt-grid">
<button class="prompt-card" data-prompt="How does RAG work?"><span class="prompt-icon">📄</span>How does RAG work?</button>
<button class="prompt-card" data-prompt="Write fibonacci in Python"><span class="prompt-icon">🐍</span>Write fibonacci</button>
<button class="prompt-card" data-prompt="Design a REST API"><span class="prompt-icon">🔌</span>Design REST API</button>
<button class="prompt-card" data-prompt="Summarize this document"><span class="prompt-icon">📝</span>Summarize doc</button>
</div>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
<div class="input-wrapper">
<button class="attach-btn" id="attachBtn" title="Upload document"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
<textarea id="chatInput" placeholder="Message NeuralAI..." rows="1" autofocus></textarea>
<button class="send-btn" id="sendBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
</div>
<div class="input-footer"><span class="footer-stat">SmolLM2-360M</span><span class="footer-stat">·</span><span class="footer-stat" id="msgCount">0 messages</span></div>
</div>
</div>
</div>

<div class="tab-content" id="tab-terminal">
<div class="terminal-wrap">
<div class="terminal-header">
<div class="terminal-dots"><div class="terminal-dot dot-red"></div><div class="terminal-dot dot-yellow"></div><div class="terminal-dot dot-green"></div></div>
<span class="terminal-title">neural@NeuralAI:~</span>
<button class="term-btn" onclick="clearTerm()">Clear</button>
<button class="term-btn" onclick="restartTerm()">Restart</button>
</div>
<div id="terminal-output"></div>
<div id="terminal-input-row">
<span style="color:#a78bfa">$</span>
<input type="text" id="terminal-input" placeholder="Type command..." autocomplete="off">
</div>
</div>
</div>
</div>

<div class="settings-modal" id="settingsModal">
<div class="settings-panel">
<div class="settings-title">⚙️ Settings</div>
<div class="settings-row"><span class="settings-label">Model</span><span class="settings-value">SmolLM2-360M</span></div>
<div class="settings-row"><span class="settings-label">Device</span><span class="settings-value" id="setDevice">CPU</span></div>
<div class="settings-row"><span class="settings-label">Version</span><span class="settings-value">2.5</span></div>
<div class="settings-row"><span class="settings-label">RAG</span><span class="settings-value" id="setRag">✓ Active</span></div>
<div class="settings-row"><span class="settings-label">Files indexed</span><span class="settings-value" id="setFiles">0</span></div>
<div class="settings-row"><span class="settings-label">Uplink</span><span class="settings-value" id="setUplink">—</span></div>
<button class="close-btn" onclick="closeSettings()">Close</button>
</div>
</div>

<script>
// State
let conversation=[],isStreaming=false,attachedFiles={},termSid=null;

// Elements
const messagesEl=document.getElementById('messages');
const welcomeScreen=document.getElementById('welcomeScreen');
const chatInput=document.getElementById('chatInput');
const sendBtn=document.getElementById('sendBtn');
const newChatBtn=document.getElementById('newChatBtn');
const attachBtn=document.getElementById('attachBtn');
const msgCountEl=document.getElementById('msgCount');
const settingsModal=document.getElementById('settingsModal');

// Helpers
const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=t=>{let o=esc(t);o=o.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);o=o.replace(/`([^`]+)`/g,'<code>$1</code>');o=o.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');return o.replace(/\n/g,'<br>');};
const toast=(m,t='')=>{const d=document.createElement('div');d.className='toast '+(t||'');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);};
const scroll=()=>messagesEl.scrollTop=messagesEl.scrollHeight;
const updateCount=()=>msgCountEl.textContent=conversation.filter(m=>m.role!=='system').length+' messages';

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
btn.classList.add('active');
document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
if(btn.dataset.tab==='terminal' && !termSid) initTerm();
});
});

// Settings
document.getElementById('settingsBtn').addEventListener('click',()=>{
fetch('/api/status').then(r=>r.json()).then(d=>{
document.getElementById('setDevice').textContent=d.device||'CPU';
document.getElementById('setRag').textContent=d.rag?'✓ Active':'✗ Off';
document.getElementById('setFiles').textContent=d.indexed_files||0;
document.getElementById('setUplink').textContent=d.uplink||'offline';
settingsModal.classList.add('open');
});
});
const closeSettings=()=>settingsModal.classList.remove('open');
settingsModal.addEventListener('click',e=>{if(e.target===settingsModal)closeSettings();});

// Export
document.getElementById('exportBtn').addEventListener('click',()=>{
if(!conversation.length){toast('No conversation','error');return;}
const md=conversation.filter(m=>m.role!=='system').map(m=>`**${m.role}:** ${m.content}`).join('\n\n');
const b=new Blob([`# NeuralAI Chat\n\n${md}`],{type:'text/markdown'});
const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='neuralai.md';a.click();
toast('Exported!','success');
});

// Info
document.getElementById('infoBtn').addEventListener('click',()=>{
fetch('/api/status').then(r=>r.json()).then(d=>toast(`NeuralAI ${d.version||'2.5'} | ${d.device||'CPU'} | RAG: ${d.rag?'✓':'✗'}`,'success'));
});

// New chat
newChatBtn.addEventListener('click',()=>{
conversation=[];messagesEl.innerHTML='';welcomeScreen.style.display='flex';
chatInput.value='';attachedFiles={};updateCount();
document.getElementById('attachedFiles')?.remove();
});

// Input
chatInput.addEventListener('input',()=>{
chatInput.style.height='auto';
chatInput.style.height=Math.min(chatInput.scrollHeight,120)+'px';
sendBtn.disabled=!chatInput.value.trim()||isStreaming;
});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)sendMsg();}});
sendBtn.addEventListener('click',()=>{if(!sendBtn.disabled)sendMsg();});

// Prompts
document.querySelectorAll('.prompt-card').forEach(b=>{
b.addEventListener('click',()=>{chatInput.value=b.dataset.prompt;chatInput.dispatchEvent(new Event('input'));sendMsg();});
});

// Attach
attachBtn.addEventListener('click',()=>{
const i=document.createElement('input');i.type='file';i.accept='.pdf,.docx,.doc,.txt,.md';
i.onchange=async()=>{
if(!i.files[0])return;
const f=i.files[0],fd=new FormData();fd.append('file',f);
toast(`Uploading ${f.name}...`);
try{
const r=await fetch('/api/upload',{method:'POST',body:fd}),d=await r.json();
if(d.error){toast(d.error,'error');return;}
attachedFiles[d.file_id]=d.filename;
toast(d.message,'success');
let el=document.getElementById('attachedFiles');
if(!el){el=document.createElement('div');el.id='attachedFiles';el.className='attached-files';document.querySelector('.chat-area').insertBefore(el,document.querySelector('.input-area'));}
el.innerHTML=Object.values(attachedFiles).map(n=>`<span class="file-chip">📄 ${n}</span>`).join('');
}catch(e){toast('Upload failed','error');}
};
i.click();
});

// Send message
async function sendMsg(){
const msg=chatInput.value.trim();if(!msg||isStreaming)return;
welcomeScreen.style.display='none';
addMsg('user',msg);
conversation.push({role:'user',content:msg});
chatInput.value='';chatInput.style.height='auto';updateCount();
isStreaming=true;sendBtn.disabled=false;
sendBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

const el=addMsg('assistant',''),b=el.querySelector('.msg-bubble');
b.innerHTML='<div class="thinking"><div class="dots"><span></span><span></span><span></span></div> Thinking...</div>';
scroll();
try{
const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:msg,temperature:0.7,max_tokens:512,messages:conversation,file_ids:Object.keys(attachedFiles)})});
if(!r.ok)throw new Error('HTTP '+r.status);
const reader=r.body.getReader(),dec=new TextDecoder();
let full='';b.innerHTML='';
while(true){
const {done,value}=await reader.read();if(done)break;
const chunk=dec.decode(value,{stream:true});
for(const line of chunk.split('\n')){
if(line.startsWith('data: ')){
const raw=line.slice(6).trim();
if(raw==='[DONE]'){isStreaming=false;break;}
try{const p=JSON.parse(raw);if(p.content){full+=p.content;b.innerHTML=fmt(full);scroll();}}catch(e){}
}
}
}
conversation.push({role:'assistant',content:full});
}catch(e){b.innerHTML='<span style="color:#f87171">Error: '+e.message+'</span>';}
finally{isStreaming=false;sendBtn.disabled=!chatInput.value.trim();sendBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';}
}

function addMsg(role,txt){
const d=document.createElement('div');d.className='message '+role;
const av=role==='assistant'?'<div class="msg-avatar">N</div>':'<div class="msg-avatar">D</div>';
d.innerHTML=av+`<div class="msg-bubble">${esc(txt)}</div>`;
messagesEl.appendChild(d);scroll();return d;
}

// Terminal
async function initTerm(){
try{
const r=await fetch('/api/terminal/create',{method:'POST'}),d=await r.json();
termSid=d.session_id;
}catch(e){termOut('Terminal init failed: '+e.message,'error');}
}

function termOut(txt,cls=''){
const el=document.getElementById('terminal-output');
el.innerHTML+=`<div class="term-line ${cls}">${esc(txt)}</div>`;
el.scrollTop=el.scrollHeight;
}

const clearTerm=()=>document.getElementById('terminal-output').innerHTML='';
const restartTerm=async()=>{if(termSid){await fetch('/api/terminal/'+termSid+'/stop',{method:'POST'});termSid=null;}clearTerm();initTerm();};

document.getElementById('terminal-input').addEventListener('keydown',async e=>{
if(e.key!=='Enter')return;
const inp=e.target,cmd=inp.value.trim();inp.value='';
if(!cmd)return;
if(cmd==='clear'){clearTerm();return;}
if(cmd==='help'){termOut('Commands: help, clear, model, uplink, neural <msg>');return;}
if(cmd==='model'){const d=await fetch('/api/status').then(r=>r.json());termOut(`Model: ${d.model} (${d.device})`);return;}
if(cmd==='uplink'){try{const d=await fetch('http://localhost:7000/health').then(r=>r.json());termOut(`Uplink: ${d.status} | Tasks: ${d.active_tasks}`,'success');}catch{termOut('Uplink: offline','error');}return;}
if(cmd.startsWith('neural ')){
const msg=cmd.slice(7);termOut('[NeuralAI] Thinking...','info');
try{
const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:msg,messages:[{role:'user',content:msg}],max_tokens:256})});
const reader=r.body.getReader(),dec=new TextDecoder();let full='';
while(true){const {done,value}=await reader.read();if(done)break;const c=dec.decode(value);for(const l of c.split('\n')){if(l.startsWith('data: ')){const raw=l.slice(6).trim();if(raw==='[DONE]')break;try{const p=JSON.parse(raw);if(p.content)full+=p.content;}catch{}}}termOut(full,'success');}
catch(e){termOut('Error: '+e.message,'error');}return;
}
if(!termSid){termOut('Terminal not ready','error');return;}
try{await fetch('/api/terminal/'+termSid+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:cmd+'\n'})});}catch{termOut('Write failed','error');}
});

chatInput.dispatchEvent(new Event('input'));
</script>
</body>
</html>
