<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">🧠</span>
          <span class="logo-text">NeuralAI</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
      </div>
      <div class="chat-history" id="chatHistory">
        <div class="chat-history-label">Today</div>
        <button class="history-item active" data-id="new">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>New Conversation</span>
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="settings-btn" id="settingsBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <!-- Settings Panel (hidden by default) -->
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
          <h2>Settings</h2>
          <button class="settings-close" id="settingsClose">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <label>Model</label>
            <select id="modelSelect">
              <option value="neural" selected>NeuralAI (Custom)</option>
            </select>
          </div>
          <div class="settings-section">
            <button class="danger-btn" id="clearBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              Clear all conversations
            </button>
          </div>
        </div>
      </div>

      <div class="chat-container" id="chatContainer">
        <!-- Welcome screen -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-content">
            <div class="welcome-icon">🧠</div>
            <h1>NeuralAI</h1>
            <p>Your custom fine-tuned language model. Built from SmolLM2-360M with QLoRA fine-tuning for specialized tasks.</p>
            <div class="quick-prompts">
              <button class="prompt-chip" data-prompt="Explain how RAG works in simple terms">How does RAG work?</button>
              <button class="prompt-chip" data-prompt="Write a Python function to fibonacci">Write fibonacci in Python</button>
              <button class="prompt-chip" data-prompt="Help me design a REST API">Design a REST API</button>
              <button class="prompt-chip" data-prompt="Summarize this document for me">Summarize a document</button>
            </div>
          </div>
        </div>
        <!-- Messages will be inserted here -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-container">
          <textarea 
            id="chatInput" 
            placeholder="Message NeuralAI..." 
            rows="1" 
            autofocus
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="char-count" id="charCount">0</span>
          <span>NeuralAI may produce inaccurate information.</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Toggle sidebar button (mobile) -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <script src="/static/js/main.js"></script>
</body>
</html>
