<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/static/logo.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070c;--surface:#0f0f17;--surface-2:#14141f;--surface-hover:#1a1a28;
  --border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.1);
  --text:#e4e4e7;--text-muted:#6b6b76;--text-dim:#3e3e50;
  --accent:#7c3aed;--accent-2:#6d28d9;--accent-glow:rgba(124,58,237,0.25);
  --accent-text:#a78bfa;--cyan:#22d3ee;--green:#10b981;--red:#ef4444;
  --user-bg:linear-gradient(135deg,#1e1b4b,#0f172a);
  --radius:14px;--radius-sm:8px;--radius-xs:5px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'Space Mono',monospace;
  --shadow:0 8px 32px rgba(0,0,0,0.45);--transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}
.header{height:52px;background:rgba(7,7,12,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:50;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4}
.header-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-img{width:28px;height:28px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:transparent;box-shadow:0 0 0 2px rgba(124,58,237,0.4),0 0 14px rgba(124,58,237,0.2)}
.logo-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 0%,var(--accent-text) 60%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.model-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:500;color:var(--text-muted)}
.model-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.header-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:34px;height:34px;background:transparent;border:none;border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition)}
.icon-btn:hover{background:var(--surface-hover);color:var(--text)}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.new-chat-btn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(34,211,238,0.08));border:1px solid rgba(124,58,237,0.3);border-radius:var(--radius);color:var(--accent-text);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font)}
.new-chat-btn:hover{background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(34,211,238,0.12));border-color:rgba(124,58,237,0.5);box-shadow:0 0 20px var(--accent-glow)}
.new-chat-btn svg{flex-shrink:0}
.sidebar-search{padding:10px 16px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px}
.search-box svg{color:var(--text-muted);flex-shrink:0}
.search-box input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font)}
.search-box input::placeholder{color:var(--text-muted)}
.sidebar-history{flex:1;overflow-y:auto;padding:8px 10px}
.history-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-dim);padding:6px 8px 8px}
.history-item{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;background:transparent;border:none;border-radius:var(--radius-sm);color:var(--text-muted);font-size:13px;text-align:left;cursor:pointer;transition:all var(--transition);margin-bottom:2px;font-family:var(--font)}
.history-item:hover{background:var(--surface-hover);color:var(--text)}
.history-item.active{background:var(--accent-glow);color:var(--text);border:1px solid rgba(124,58,237,0.2)}
.history-item svg{flex-shrink:0;opacity:0.5}
.history-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;transition:background var(--transition)}
.user-info:hover{background:var(--surface-hover)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.user-details{flex:1}
.user-name{font-size:13px;font-weight:600;color:var(--text)}
.user-status{font-size:11px;color:var(--text-muted)}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:24px 32px 16px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;text-align:center;padding:40px 24px;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.welcome-logo{width:72px;height:72px;border-radius:20px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px var(--accent-glow),0 0 80px rgba(34,211,238,0.1);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 40px var(--accent-glow),0 0 80px rgba(34,211,238,0.1)}50%{box-shadow:0 0 60px var(--accent-glow),0 0 100px rgba(34,211,238,0.2)}}
.welcome-logo img{width:100%;height:100%;object-fit:cover}
.welcome h1{font-size:32px;font-weight:700;letter-spacing:-0.04em;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent-text) 60%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome-sub{font-size:14px;color:var(--text-muted);max-width:460px;line-height:1.65;margin-bottom:32px}
.prompt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;width:100%}
.prompt-card{padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:13px;cursor:pointer;transition:all var(--transition);text-align:left;display:flex;align-items:center;gap:10px;font-family:var(--font)}
.prompt-card:hover{background:var(--surface-hover);border-color:var(--border-2);color:var(--text);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.prompt-card-icon{width:28px;height:28px;border-radius:7px;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.messages{display:flex;flex-direction:column;gap:28px}
.message{display:flex;gap:14px;max-width:760px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.message.assistant .msg-avatar{background:linear-gradient(135deg,var(--accent),#4f46e5);box-shadow:0 0 16px var(--accent-glow)}
.message.user .msg-avatar{background:linear-gradient(135deg,#1e40af,#1e3a8a)}
.msg-avatar svg{width:16px;height:16px;stroke:#fff}
.message.user .msg-avatar svg{stroke:#93c5fd}
.msg-content{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 4px}
.msg-role{font-size:12px;font-weight:600;color:var(--text-muted)}
.msg-time{font-size:11px;color:var(--text-dim)}
.message.user .msg-meta{flex-direction:row-reverse}
.msg-bubble{position:relative;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;transition:background var(--transition)}
.message.assistant .msg-bubble{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 16px 4px}
.message.user .msg-bubble{background:var(--user-bg);border:1px solid rgba(99,102,241,0.15);border-radius:16px 16px 4px 16px;color:#e0e7ff}
.msg-bubble pre{background:#09090b;border:1px solid var(--border-2);border-radius:var(--radius-sm);padding:14px 16px;margin:10px 0;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.55}
.msg-bubble code{font-family:var(--mono);font-size:12.5px;background:rgba(124,58,237,0.12);padding:2px 6px;border-radius:4px;color:var(--accent-text)}
.msg-bubble pre code{background:transparent;padding:0;color:inherit}
.msg-actions{position:absolute;top:10px;right:10px;opacity:0;transition:opacity var(--transition)}
.msg-bubble:hover .msg-actions{opacity:1}
.copy-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text-muted);cursor:pointer;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px;transition:all var(--transition);font-family:var(--font)}
.copy-btn:hover{background:var(--surface-hover);color:var(--text)}
.thinking{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:13px;padding:4px 0}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.input-area{padding:0 32px 20px;flex-shrink:0}
.input-wrapper{display:flex;align-items:flex-end;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 12px 12px 18px;transition:border-color var(--transition),box-shadow var(--transition)}
.input-wrapper:focus-within{border-color:rgba(124,58,237,0.4);box-shadow:0 0 0 3px var(--accent-glow),0 0 30px rgba(124,58,237,0.1)}
.input-left{display:flex;flex-direction:column;gap:6px}
.attach-btn{width:28px;height:28px;background:transparent;border:none;border-radius:var(--radius-xs);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.attach-btn:hover{background:var(--surface-hover);color:var(--accent-text)}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font);line-height:1.6;resize:none;max-height:160px;overflow-y:auto}
textarea::placeholder{color:var(--text-muted)}
.send-btn{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0;box-shadow:0 4px 14px rgba(124,58,237,0.35)}
.send-btn:not(:disabled):hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(124,58,237,0.5)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.send-btn svg{stroke:#fff}
.input-footer{display:flex;justify-content:center;margin-top:8px;gap:8px}
.footer-stat{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.footer-stat svg{width:12px;height:12px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius);font-size:13px;color:var(--text);box-shadow:var(--shadow);z-index:200;display:flex;align-items:center;gap:10px;animation:slideIn 0.3s ease,fadeOut 0.3s ease 2.7s forwards}
.toast.success{border-color:rgba(16,185,129,0.3)}
.toast.error{border-color:rgba(239,68,68,0.3)}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateY(10px)}}
.sidebar-toggle{display:none;position:fixed;bottom:24px;left:24px;width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:50%;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(124,58,237,0.5);z-index:40}
.sidebar-toggle svg{stroke:#fff}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:39}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle{display:flex}
  .header{padding:0 12px}
  .logo-text{display:none}
  .chat-messages{padding:16px 14px 12px}
  .input-area{padding:0 14px 14px}
  .welcome h1{font-size:26px}
  .prompt-grid{grid-template-columns:1fr}
  .welcome{padding:24px 16px;min-height:auto;margin-top:40px}
  .welcome-logo{width:56px;height:56px}
  .toast{bottom:80px;right:14px;left:14px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <a href="/" class="logo">
        <div class="logo-img"><img src="/static/logo.png" alt="NeuralAI"></div>
        <span class="logo-text">NeuralAI</span>
      </a>
      <div class="model-chip"><span class="model-chip-dot"></span><span id="modelLabel">NeuralAI</span></div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="exportBtn" title="Export Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" id="infoBtn" title="Model info">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-search">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search conversations..." id="searchInput">
        </div>
      </div>
      <div class="sidebar-history" id="chatHistory">
        <div class="history-label">Today</div>
        <button class="history-item active" data-id="new">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="history-item-text">New Conversation</span>
        </button>
      </div>
      <div class="sidebar-footer">
        <div class="user-info" id="userInfoBtn">
          <div class="user-avatar">D</div>
          <div class="user-details"><div class="user-name">Dendrew</div><div class="user-status">Online</div></div>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="chat-area">
      <div class="chat-messages" id="chatContainer">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-logo"><img src="/static/logo.png" alt="NeuralAI"></div>
          <h1>NeuralAI</h1>
          <p class="welcome-sub">Your personal AI assistant. I can read documents, write and debug code, explain concepts, search the web, run tasks, and more — all powered by your fine-tuned SmolLM2-360M model.</p>
          <div class="prompt-grid">
            <button class="prompt-card" data-prompt="How does RAG work?"><span class="prompt-card-icon">&#128218;</span>How does RAG work?</button>
            <button class="prompt-card" data-prompt="Write fibonacci in Python"><span class="prompt-card-icon">&#128013;</span>Write fibonacci in Python</button>
            <button class="prompt-card" data-prompt="Design a REST API"><span class="prompt-card-icon">&#128268;</span>Design a REST API</button>
            <button class="prompt-card" data-prompt="Summarize this document"><span class="prompt-card-icon">&#128196;</span>Summarize this document</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <div class="input-left">
            <button class="attach-btn" id="attachBtn" title="Upload document">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
          </div>
          <textarea id="chatInput" placeholder="Message NeuralAI..." rows="1" autofocus></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="footer-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5 2 2-10 10z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>SmolLM2-360M</span>
          <span class="footer-stat"> &bull; </span>
          <span class="footer-stat" id="msgCount">0 messages</span>
        </div>
      </div>
    </main>
  </div>
  <button class="sidebar-toggle" id="sidebarToggle">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
