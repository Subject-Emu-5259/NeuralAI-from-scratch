<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="icon-btn" id="sidebarToggle" title="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="brand">
          <span class="brand-icon">🧠</span>
          <span class="brand-name">NeuralAI</span>
        </span>
      </div>
      <div class="header-right">
        <div class="dropdown" id="settingsDropdown">
          <button class="icon-btn" id="settingsBtn" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="dropdown-menu" id="settingsMenu">
            <div class="dropdown-section">
              <div class="dropdown-label">Temperature</div>
              <div class="slider-row">
                <input type="range" id="tempSlider" min="0" max="100" value="70">
                <span class="slider-val" id="tempVal">0.7</span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-section">
              <div class="dropdown-label">Max Tokens</div>
              <div class="slider-row">
                <input type="range" id="maxTokensSlider" min="64" max="512" step="64" value="256">
                <span class="slider-val" id="maxTokensVal">256</span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-row">
              <span>Clear Chat</span>
              <button class="danger-btn" id="clearBtn">Clear</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Sidebar (hidden by default) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <button class="sidebar-action" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">Today</div>
        <button class="sidebar-item active">New Conversation</button>
      </div>
      <div class="sidebar-footer">
        <div class="model-badge">
          <span class="model-badge-dot"></span>
          NeuralAI (Custom)
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Chat -->
    <main class="main">
      <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">🧠</div>
          <h1>NeuralAI</h1>
          <p>Your custom fine-tuned language model.</p>
          <div class="prompts">
            <button class="prompt" data-prompt="How does RAG work?">How does RAG work?</button>
            <button class="prompt" data-prompt="Write fibonacci in Python">Write fibonacci in Python</button>
            <button class="prompt" data-prompt="Design a REST API">Design a REST API</button>
            <button class="prompt" data-prompt="Summarize this document">Summarize a document</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-box">
          <textarea id="chatInput" placeholder="Message NeuralAI..." rows="1" autofocus></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-note">NeuralAI may produce inaccurate information.</div>
      </div>
    </main>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
