<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </span>
          <span class="brand-name">NeuralAI</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New chat
        </button>
      </div>

      <div class="chat-history" id="chatHistory"></div>

      <div class="sidebar-bottom">
        <button class="sidebar-action-btn" id="clearBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear conversations
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Header -->
      <header class="header">
        <button class="header-menu-btn" id="menuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-title" id="headerTitle">NeuralAI</div>
        <div class="header-actions">
          <button class="header-action-btn" id="settingsBtn" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- Chat area -->
      <div class="chat-area" id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          </div>
          <h1>NeuralAI</h1>
          <p>Your custom fine-tuned language model. Built from SmolLM2-360M with QLoRA fine-tuning.</p>
          <div class="quick-prompts">
            <button class="prompt-btn" data-prompt="Explain how RAG works in simple terms">How does RAG work?</button>
            <button class="prompt-btn" data-prompt="Write a Python function for fibonacci">Write fibonacci in Python</button>
            <button class="prompt-btn" data-prompt="Help me design a REST API">Design a REST API</button>
            <button class="prompt-btn" data-prompt="Summarize this document for me">Summarize a document</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-box">
          <textarea id="chatInput" placeholder="Message NeuralAI..." rows="1" autofocus></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-meta">
          <span class="model-badge">NeuralAI</span>
          <span>NeuralAI may produce inaccurate information</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Panel -->
  <div class="settings-overlay" id="settingsOverlay"></div>
  <aside class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close-btn" id="settingsCloseBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3>Model</h3>
        <div class="setting-item">
          <label>Active Model</label>
          <select id="modelSelect" disabled>
            <option value="neural" selected>NeuralAI (Custom)</option>
          </select>
          <span class="setting-hint">Fine-tuned SmolLM2-360M-Instruct</span>
        </div>
      </div>
      <div class="settings-section">
        <h3>Generation</h3>
        <div class="setting-item">
          <label>Temperature</label>
          <input type="range" id="tempRange" min="0" max="100" value="70">
          <span class="setting-value" id="tempValue">0.7</span>
        </div>
        <div class="setting-item">
          <label>Max Tokens</label>
          <input type="range" id="maxTokensRange" min="64" max="512" step="64" value="256">
          <span class="setting-value" id="maxTokensValue">256</span>
        </div>
      </div>
      <div class="settings-section">
        <h3>Status</h3>
        <div class="status-info" id="modelStatus">
          <div class="status-item">
            <span class="status-label">Model</span>
            <span class="status-value" id="statusModel">Loading...</span>
          </div>
          <div class="status-item">
            <span class="status-label">Type</span>
            <span class="status-value" id="statusType">—</span>
          </div>
          <div class="status-item">
            <span class="status-label">Device</span>
            <span class="status-value" id="statusDevice">—</span>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <script src="/static/js/main.js"></script>
</body>
</html>
